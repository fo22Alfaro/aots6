name: AOTS⁶ TOROIDAL CORE - Nuevo Estándar Mundial

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'   # Cada 6 horas

jobs:
  toroidal-sovereignty:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout with Toroidal Protection
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python + Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests python-dotenv

      - name: Validate Toroidal Integrity
        run: python -m pytest test_aots6.py -v --tb=no

      - name: Generate & Sign New Block
        run: |
          python aots6_core.py --generate-block --sign --timestamp

      - name: Timestamp with OTS + IPFS
        uses: orbs-network/ots-github-action@v1
        with:
          files: |
            BLOQUE-*.md
            *.hash

      - name: Enforce Sovereignty & Anti-Copy
        run: |
          python -c '
          print("AOTS⁶ SOVEREIGNTY PROTOCOL ACTIVE")
          print("Cualquier uso no autorizado viola Leyes Toroidales")
          print("Propiedad exclusiva de Alfredo Jhovany Alfaro García")
          '

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aots6-toroidal-build
          path: |
            BLOQUE-*.md
            *.hash
            *.sig
            *.ots
            SOVEREIGNTY_*
